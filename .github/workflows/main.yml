name: Daily RSI Agent

on:
  schedule:
    # 18:00 UTC, Monday-Friday
    - cron: '0 18 * * 1-5'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install yfinance pandas_ta pandas

      - name: Run Agent
        run: python agent.py
